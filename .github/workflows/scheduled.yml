name: Scheduled SDK Health Check

on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

jobs:
  scheduled-verify:
    name: Verify number-guess-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare clean environment
        run: mkdir -p /tmp/ng-sdk-check

      - name: Initialize project
        working-directory: /tmp/ng-sdk-check
        run: npm init -y

      - name: Fetch number-guess-sdk from registry
        working-directory: /tmp/ng-sdk-check
        run: npm install number-guess-sdk

      - name: Confirm SDK require succeeds
        working-directory: /tmp/ng-sdk-check
        run: node -e "const sdk = require('number-guess-sdk'); console.log('Scheduled health check: number-guess-sdk OK');"

      - name: Show dependency tree
        working-directory: /tmp/ng-sdk-check
        run: npm ls --all

      - name: Enumerate package files
        working-directory: /tmp/ng-sdk-check
        run: ls -lR node_modules/number-guess-sdk/
